app = "sayless"
primary_region = "iad"

[build]

[env]
  PORT = "8787"
  ALLOWED_ORIGIN = "https://www.youtube.com"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
