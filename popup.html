<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, "Segoe UI", sans-serif;
        width: 340px;
        padding: 14px;
        margin: 0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 12px;
        margin: 10px 0 4px;
        color: #444;
        font-weight: 600;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 12px;
        font-family: monospace;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        margin-top: 12px;
        padding: 7px 12px;
        font-size: 13px;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #1558b0;
      }
      .status {
        margin-top: 8px;
        font-size: 11px;
        min-height: 14px;
      }
      .ok {
        color: #2e7d32;
      }
      .err {
        color: #c62828;
      }
      .note {
        margin-top: 12px;
        font-size: 11px;
        color: #666;
        line-height: 1.4;
      }
      code {
        font-size: 11px;
        background: #f3f3f3;
        padding: 1px 3px;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Bullshit Detector</h1>

    <label for="key">Anthropic API key</label>
    <input id="key" type="password" placeholder="sk-ant-..." />

    <label for="server">Transcript server URL</label>
    <input
      id="server"
      type="text"
      placeholder="https://yt-transcript.fly.dev"
    />

    <button id="save">Save</button>
    <div class="status" id="status"></div>

    <div class="note">
      Both values are stored locally in <code>chrome.storage.local</code>. Reload
      youtube.com after saving. The transcript server runs
      <code>yt-dlp</code> server-side; see <code>server/README.md</code> to
      deploy your own.
    </div>
    <script src="popup.js"></script>
  </body>
</html>
